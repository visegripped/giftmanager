version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: giftmanager-postgres
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-giftmanager}
      POSTGRES_USER: ${POSTGRES_USER:-giftmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-giftmanager_local_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - giftmanager-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-giftmanager}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  giftmanager-network:
    driver: bridge
